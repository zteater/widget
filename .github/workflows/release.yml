name: Release

on:
  workflow_call:
    inputs:
      environment_name:
        required: false
        type: string
        default: prod
      tag:
        required: true
        type: string
      title:
        required: true
        type: string
      sha:
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.sha }}

      - name: Promote prerelease to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ inputs.tag }}" \
            --title "${{ inputs.title }}" \
            --latest \
            --prerelease=false
