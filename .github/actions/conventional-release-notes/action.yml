name: Conventional Release Notes
description: Generate release notes from conventional commits

inputs:
  commit_range:
    description: Git commit range to inspect
    required: true
  output_file:
    description: File to write the generated notes to
    required: true
  exclude_pattern:
    description: Optional grep pattern for commits to exclude
    required: false
    default: '^chore\(release\): bump version to |\[skip ci\]'

runs:
  using: composite
  steps:
    - name: Generate notes
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail

        commit_range="${{ inputs.commit_range }}"
        output_file="${{ inputs.output_file }}"
        exclude_pattern="${{ inputs.exclude_pattern }}"
        repo="${{ github.repository }}"

        all_commits="$(git log "$commit_range" --format='%s%x09%h%x09%H%x09%an' | grep -Ev "$exclude_pattern" || true)"

        : > "$output_file"

        features_file="$(mktemp)"
        fixes_file="$(mktemp)"
        performance_file="$(mktemp)"
        refactors_file="$(mktemp)"
        documentation_file="$(mktemp)"
        tests_file="$(mktemp)"
        build_file="$(mktemp)"
        ci_file="$(mktemp)"
        chores_file="$(mktemp)"
        other_file="$(mktemp)"

        cleanup() {
          rm -f "$features_file" "$fixes_file" "$performance_file" "$refactors_file" \
            "$documentation_file" "$tests_file" "$build_file" "$ci_file" "$chores_file" "$other_file"
        }
        trap cleanup EXIT

        author_label() {
          local full_sha="$1"
          local fallback_author="$2"
          local login
          login="$(gh api "repos/${repo}/commits/${full_sha}" --jq '.author.login // empty' 2>/dev/null || true)"
          if [ -n "$login" ]; then
            printf '[@%s](https://github.com/%s)' "$login" "$login"
          else
            printf '%s' "$fallback_author"
          fi
        }

        clean_subject() {
          perl -pe 's/^([a-z]+)(\([^)]+\))?(!)?:\s+//'
        }

        while IFS=$'\t' read -r subject short_sha full_sha author_name; do
          [ -n "$subject" ] || continue

          author_md="$(author_label "$full_sha" "$author_name")"
          if printf '%s\n' "$subject" | grep -Eq '^(feat|fix|perf|refactor|docs|test|build|ci|chore)(\([^)]+\))?!?:'; then
            cleaned_subject="$(printf '%s\n' "$subject" | clean_subject)"
          else
            cleaned_subject="$subject"
          fi

          line="- ${cleaned_subject} (${short_sha}, ${author_md})"

          case "$subject" in
            feat*:*|feat!:*) printf '%s\n' "$line" >> "$features_file" ;;
            fix*:*|fix!:*) printf '%s\n' "$line" >> "$fixes_file" ;;
            perf*:*|perf!:*) printf '%s\n' "$line" >> "$performance_file" ;;
            refactor*:*|refactor!:*) printf '%s\n' "$line" >> "$refactors_file" ;;
            docs*:*|docs!:*) printf '%s\n' "$line" >> "$documentation_file" ;;
            test*:*|test!:*) printf '%s\n' "$line" >> "$tests_file" ;;
            build*:*|build!:*) printf '%s\n' "$line" >> "$build_file" ;;
            ci*:*|ci!:*) printf '%s\n' "$line" >> "$ci_file" ;;
            chore*:*|chore!:*) printf '%s\n' "$line" >> "$chores_file" ;;
            *) printf '%s\n' "$line" >> "$other_file" ;;
          esac
        done <<< "$all_commits"

        append_section() {
          local heading="$1"
          local file="$2"
          if [ -s "$file" ]; then
            printf '## %s\n' "$heading" >> "$output_file"
            cat "$file" >> "$output_file"
            printf '\n' >> "$output_file"
          fi
        }

        append_section 'Features' "$features_file"
        append_section 'Fixes' "$fixes_file"
        append_section 'Performance' "$performance_file"
        append_section 'Refactors' "$refactors_file"
        append_section 'Documentation' "$documentation_file"
        append_section 'Tests' "$tests_file"
        append_section 'Build' "$build_file"
        append_section 'CI' "$ci_file"
        append_section 'Chores' "$chores_file"
        append_section 'Other' "$other_file"

        if ! grep -q '^## ' "$output_file"; then
          printf '## Changes\n- No conventional commits found in this range.\n' >> "$output_file"
        fi
