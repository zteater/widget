name: Issue Planning

on:
  issues:
    types:
      - opened
  issue_comment:
    types:
      - created

permissions:
  contents: read
  issues: write

concurrency:
  group: ${{ github.workflow }}-issue-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  codex_plan:
    if: |
      github.event_name == 'issues' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.comment.user.type != 'Bot' &&
        github.event.comment.user.login != 'github-actions[bot]' &&
        !startsWith(github.event.comment.body, '/approve')
      )
    runs-on: ubuntu-latest
    outputs:
      final_message: ${{ steps.plan.outputs.final_message }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: React to new issue
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.reactions.createForIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              content: 'eyes',
            })

      - name: React to planning reply comment
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes',
            })

      - name: Link issue to project and set In Planning
        uses: actions/github-script@v7
        env:
          PROJECT_ID: ${{ vars.GITHUB_PROJECT_ID || '' }}
          PROJECT_STATUS_FIELD_ID: ${{ vars.GITHUB_PROJECT_STATUS_FIELD_ID || '' }}
          PROJECT_STATUS_IN_PLANNING_OPTION_ID: ${{ vars.GITHUB_PROJECT_STATUS_IN_PLANNING_OPTION_ID || '' }}
          PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN || '' }}
        with:
          github-token: ${{ env.PROJECT_TOKEN != '' && env.PROJECT_TOKEN || github.token }}
          script: |
            const projectId = process.env.PROJECT_ID;
            const statusFieldId = process.env.PROJECT_STATUS_FIELD_ID;
            const inPlanningOptionId = process.env.PROJECT_STATUS_IN_PLANNING_OPTION_ID;
            const issueNodeId = context.payload.issue.node_id;

            if (!projectId || !statusFieldId || !inPlanningOptionId) {
              core.info('Project configuration is not set. Skipping project link/status update.');
              return;
            }

            const projectQuery = `
              query($projectId: ID!) {
                node(id: $projectId) {
                  ... on ProjectV2 {
                    items(first: 100) {
                      nodes {
                        id
                        content {
                          ... on Issue {
                            id
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const projectData = await github.graphql(projectQuery, { projectId });
            const items = projectData.node?.items?.nodes || [];
            let itemId = items.find((item) => item.content?.id === issueNodeId)?.id;

            if (!itemId) {
              const addMutation = `
                mutation($projectId: ID!, $contentId: ID!) {
                  addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                    item {
                      id
                    }
                  }
                }
              `;
              const addResult = await github.graphql(addMutation, {
                projectId,
                contentId: issueNodeId,
              });
              itemId = addResult.addProjectV2ItemById.item.id;
            }

            const updateMutation = `
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(
                  input: {
                    projectId: $projectId
                    itemId: $itemId
                    fieldId: $fieldId
                    value: { singleSelectOptionId: $optionId }
                  }
                ) {
                  projectV2Item {
                    id
                  }
                }
              }
            `;

            await github.graphql(updateMutation, {
              projectId,
              itemId,
              fieldId: statusFieldId,
              optionId: inPlanningOptionId,
            });

      - name: Collect issue conversation
        id: conversation
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              per_page: 100,
            });

            const lines = comments.map((comment) => {
              const body = (comment.body || '').trim() || '[no comment body]';
              return [`- ${comment.user.login}:`, body].join('\n');
            });

            const conversation = lines.length > 0 ? lines.join('\n\n') : 'No comments yet.';
            core.setOutput('conversation', conversation);

      - name: Collect repository context
        id: repo_context
        shell: bash
        run: |
          set -euo pipefail

          {
            echo 'Repository file tree:'
            find . -maxdepth 4 -type f \
              -not -path './.git/*' \
              -not -path './.venv/*' \
              -not -path './.uv-cache/*' \
              -not -path './dist/*' \
              -not -path './src/widget/__pycache__/*' \
              | sort
            echo

            for file in AGENTS.md Makefile pyproject.toml .github/workflows/ci.yml .github/workflows/build.yml src/widget/app.py src/widget/cli.py src/widget/models.py src/widget/store.py; do
              if [ -f "$file" ]; then
                echo "===== BEGIN FILE: $file ====="
                sed -n '1,260p' "$file"
                echo "===== END FILE: $file ====="
                echo
              fi
            done
          } > repo-context.txt

          {
            echo 'context<<EOF'
            cat repo-context.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Generate issue plan with Codex
        id: plan
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body || 'No issue body provided.' }}
          ISSUE_CONVERSATION: ${{ steps.conversation.outputs.conversation }}
          REPO_CONTEXT: ${{ steps.repo_context.outputs.context }}
        shell: bash
        run: |
          set -euo pipefail

          prompt_file=".github/codex/prompts/issue-plan.md"
          instructions="$(cat "$prompt_file")"

          response_json="$(jq -n \
            --arg model "gpt-5.2-codex" \
            --arg instructions "$instructions" \
            --arg issue_title "$ISSUE_TITLE" \
            --arg issue_body "$ISSUE_BODY" \
            --arg issue_conversation "$ISSUE_CONVERSATION" \
            --arg repo_context "$REPO_CONTEXT" \
            '{
              model: $model,
              input: [
                {
                  role: "user",
                  content: [
                    {
                      type: "input_text",
                      text: ($instructions
                        + "\n\nIssue title: " + $issue_title
                        + "\n\nIssue body:\n" + $issue_body
                        + "\n\nIssue comments:\n" + $issue_conversation
                        + "\n\nRepository context:\n" + $repo_context)
                    }
                  ]
                }
              ]
            }')"

          api_response="$(curl -sS https://api.openai.com/v1/responses \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d "$response_json")"

          final_message="$(printf '%s' "$api_response" | jq -r '[.output[]? | select(.type == "message") | .content[]? | select(.type == "output_text") | .text] | join("\n\n")')"

          if [ -z "$final_message" ] || [ "$final_message" = "null" ]; then
            echo "OpenAI response did not contain output text" >&2
            printf '%s\n' "$api_response" >&2
            exit 1
          fi

          {
            echo 'final_message<<EOF'
            printf '%s\n' "$final_message"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

  post_plan:
    runs-on: ubuntu-latest
    needs: codex_plan
    if: needs.codex_plan.outputs.final_message != ''

    steps:
      - name: Comment with Codex plan
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex_plan.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: process.env.CODEX_FINAL_MESSAGE,
            })
