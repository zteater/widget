name: Issue Implementation

on:
  issue_comment:
    types:
      - created

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: issue-implementation-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  implement:
    if: |
      github.event.comment.user.login == 'zteater' &&
      startsWith(github.event.comment.body, '/approve')
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Initialize implementation log
        run: ': > implementation.log'

      - name: Collect issue conversation
        id: conversation
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              per_page: 100,
            });

            const lines = comments.map((comment) => {
              const body = (comment.body || '').trim() || '[no comment body]';
              return [`- ${comment.user.login}:`, body].join('\n');
            });

            const conversation = lines.length > 0 ? lines.join('\n\n') : 'No comments yet.';
            core.setOutput('conversation', conversation);

      - name: Collect repository context
        id: repo_context
        shell: bash
        run: |
          set -euo pipefail

          {
            echo 'Repository file tree:'
            find . -maxdepth 4 -type f \
              -not -path './.git/*' \
              -not -path './.venv/*' \
              -not -path './.uv-cache/*' \
              -not -path './dist/*' \
              -not -path './logs_*/*' \
              | sort
            echo

            for file in AGENTS.md Makefile pyproject.toml .github/workflows/ci.yml .github/workflows/build.yml; do
              if [ -f "$file" ]; then
                echo "===== BEGIN FILE: $file ====="
                sed -n '1,260p' "$file"
                echo "===== END FILE: $file ====="
                echo
              fi
            done
          } > repo-context.txt

          {
            echo 'context<<EOF'
            cat repo-context.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: React to approval comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket',
            })

      - name: Generate implementation edits with Codex
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body || 'No issue body provided.' }}
          ISSUE_CONVERSATION: ${{ steps.conversation.outputs.conversation }}
          REPO_CONTEXT: ${{ steps.repo_context.outputs.context }}
        shell: bash
        run: |
          exec > >(tee -a implementation.log) 2>&1
          set -euo pipefail

          prompt_file=".github/codex/prompts/issue-implement.md"
          instructions="$(cat "$prompt_file")"

          response_json="$(jq -n \
            --arg model "gpt-5.2-codex" \
            --arg instructions "$instructions" \
            --arg issue_title "$ISSUE_TITLE" \
            --arg issue_body "$ISSUE_BODY" \
            --arg issue_conversation "$ISSUE_CONVERSATION" \
            --arg repo_context "$REPO_CONTEXT" \
            '{
              model: $model,
              input: [
                {
                  role: "user",
                  content: [
                    {
                      type: "input_text",
                      text: ($instructions
                        + "\n\nIssue title: " + $issue_title
                        + "\n\nIssue body:\n" + $issue_body
                        + "\n\nIssue comments:\n" + $issue_conversation
                        + "\n\nRepository context:\n" + $repo_context)
                    }
                  ]
                }
              ]
            }')"

          api_response="$(curl -sS https://api.openai.com/v1/responses \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d "$response_json")"

          raw_text="$(printf '%s' "$api_response" | jq -r '[.output[]? | select(.type == "message") | .content[]? | select(.type == "output_text") | .text] | join("\n\n")')"

          if [ -z "$raw_text" ] || [ "$raw_text" = "null" ]; then
            echo "OpenAI response did not contain edit instructions" >&2
            printf '%s\n' "$api_response" >&2
            exit 1
          fi

          printf '%s\n' "$raw_text" > codex-raw.txt

          python3 - <<'PY'
          import json
          from pathlib import Path

          raw = Path('codex-raw.txt').read_text().strip()
          if raw.startswith('```'):
              lines = raw.splitlines()
              if lines and lines[0].startswith('```'):
                  lines = lines[1:]
              if lines and lines[-1].startswith('```'):
                  lines = lines[:-1]
              raw = '\n'.join(lines).strip()

          data = json.loads(raw)
          edits = data.get('edits', [])
          if not isinstance(edits, list):
              raise SystemExit('JSON response must contain an edits array.')

          normalized = []
          for index, edit in enumerate(edits, start=1):
              if not isinstance(edit, dict):
                  raise SystemExit(f'Edit #{index} must be an object.')
              path = edit.get('path')
              action = edit.get('action')
              content = edit.get('content')
              if not path or not isinstance(path, str):
                  raise SystemExit(f'Edit #{index} is missing a valid path.')
              if action != 'write':
                  raise SystemExit(f'Edit #{index} must use action "write".')
              if not isinstance(content, str):
                  raise SystemExit(f'Edit #{index} is missing string content.')
              normalized.append({'path': path, 'content': content})

          Path('codex-edits.json').write_text(json.dumps({'edits': normalized}, indent=2) + '\n')
          PY

          echo 'Generated edit plan:'
          sed -n '1,120p' codex-edits.json

      - name: Create implementation branch
        env:
          BRANCH_NAME: codex/issue-${{ github.event.issue.number }}
        shell: bash
        run: |
          exec > >(tee -a implementation.log) 2>&1
          set -euo pipefail
          git checkout -B "$BRANCH_NAME"

      - name: Apply edits
        shell: bash
        run: |
          exec > >(tee -a implementation.log) 2>&1
          set -euo pipefail

          python3 - <<'PY'
          import json
          from pathlib import Path

          repo = Path('.').resolve()
          data = json.loads(Path('codex-edits.json').read_text())
          edits = data.get('edits', [])

          for edit in edits:
              rel = edit['path']
              target = (repo / rel).resolve()
              try:
                  target.relative_to(repo)
              except ValueError as exc:
                  raise SystemExit(f'Edit path escapes repository: {rel}') from exc
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_text(edit['content'])
          PY

          if git diff --quiet; then
            echo 'Codex did not produce any repository changes.' >&2
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Validate changes
        shell: bash
        run: |
          exec > >(tee -a implementation.log) 2>&1
          set -euo pipefail
          uv sync --dev
          uv run python -m compileall src tests
          uv run pytest

      - name: Commit changes
        env:
          BRANCH_NAME: codex/issue-${{ github.event.issue.number }}
        shell: bash
        run: |
          exec > >(tee -a implementation.log) 2>&1
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "feat: implement issue #${{ github.event.issue.number }}"
          git push origin "$BRANCH_NAME" --force-with-lease

      - name: Open or update pull request
        uses: actions/github-script@v7
        env:
          BRANCH_NAME: codex/issue-${{ github.event.issue.number }}
        with:
          github-token: ${{ github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = process.env.BRANCH_NAME;
            const issueNumber = context.payload.issue.number;
            const title = `feat: implement issue #${issueNumber}`;
            const body = [
              `Closes #${issueNumber}`,
              '',
              'This PR was generated from the approved issue plan.',
            ].join('\n');

            const existing = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              head: `${owner}:${branch}`,
              per_page: 100,
            });

            if (existing.length > 0) {
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: existing[0].number,
                title,
                body,
              });
            } else {
              await github.rest.pulls.create({
                owner,
                repo,
                title,
                head: branch,
                base: 'main',
                body,
              });
            }

      - name: Comment success
        uses: actions/github-script@v7
        env:
          BRANCH_NAME: codex/issue-${{ github.event.issue.number }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `Implementation started from the approved plan and a PR branch was pushed: \`${process.env.BRANCH_NAME}\`.`,
            })

      - name: Comment failure
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            let logTail = 'No implementation log captured.';
            if (fs.existsSync('implementation.log')) {
              const lines = fs.readFileSync('implementation.log', 'utf8').trim().split('\n');
              logTail = lines.slice(-80).join('\n') || logTail;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: [
                'Implementation was approved, but the automated apply/test flow failed.',
                '',
                'Recent failure output:',
                '```text',
                logTail,
                '```',
              ].join('\n'),
            })
