name: Issue Implementation

on:
  issue_comment:
    types:
      - created

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: issue-implementation-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  implement:
    if: |
      github.event.comment.user.login == 'zteater' &&
      startsWith(github.event.comment.body, '/approve')
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Initialize implementation log
        run: ': > implementation.log'

      - name: Collect issue conversation
        id: conversation
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              per_page: 100,
            });

            const lines = comments.map((comment) => {
              const body = (comment.body || '').trim() || '[no comment body]';
              return [`- ${comment.user.login}:`, body].join('\n');
            });

            const conversation = lines.length > 0 ? lines.join('\n\n') : 'No comments yet.';
            core.setOutput('conversation', conversation);

      - name: Generate implementation patch with Codex
        id: codex
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body || 'No issue body provided.' }}
          ISSUE_CONVERSATION: ${{ steps.conversation.outputs.conversation }}
        shell: bash
        run: |
          exec > >(tee -a implementation.log) 2>&1
          set -euo pipefail

          prompt_file=".github/codex/prompts/issue-implement.md"
          instructions="$(cat "$prompt_file")"

          response_json="$(jq -n \
            --arg model "gpt-5.2-codex" \
            --arg instructions "$instructions" \
            --arg issue_title "$ISSUE_TITLE" \
            --arg issue_body "$ISSUE_BODY" \
            --arg issue_conversation "$ISSUE_CONVERSATION" \
            '{
              model: $model,
              input: [
                {
                  role: "user",
                  content: [
                    {
                      type: "input_text",
                      text: ($instructions + "\n\nIssue title: " + $issue_title + "\n\nIssue body:\n" + $issue_body + "\n\nIssue comments:\n" + $issue_conversation)
                    }
                  ]
                }
              ]
            }')"

          api_response="$(curl -sS https://api.openai.com/v1/responses \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d "$response_json")"

          raw_text="$(printf '%s' "$api_response" | jq -r '[.output[]? | select(.type == "message") | .content[]? | select(.type == "output_text") | .text] | join("\n\n")')"

          if [ -z "$raw_text" ] || [ "$raw_text" = "null" ]; then
            echo "OpenAI response did not contain patch text" >&2
            printf '%s\n' "$api_response" >&2
            exit 1
          fi

          printf '%s\n' "$raw_text" > codex-raw.txt

          python3 - <<'PY'
          from pathlib import Path
          raw = Path('codex-raw.txt').read_text()
          text = raw.strip()
          patch = text
          if '```' in text:
              lines = text.splitlines()
              inside = False
              captured = []
              for line in lines:
                  if line.startswith('```'):
                      inside = not inside
                      continue
                  if inside:
                      captured.append(line)
              if captured:
                  patch = '\n'.join(captured).strip()
          if 'diff --git ' in patch:
              patch = patch[patch.index('diff --git '):]
          Path('codex.patch').write_text(patch + ('\n' if patch and not patch.endswith('\n') else ''))
          PY

          if ! grep -q '^diff --git ' codex.patch; then
            echo "Codex response did not contain a valid git patch header." >&2
            echo "First 80 lines of raw output:" >&2
            sed -n '1,80p' codex-raw.txt >&2
            exit 1
          fi

          if ! git apply --check codex.patch; then
            echo "git apply --check failed for extracted patch." >&2
            echo "First 80 lines of extracted patch:" >&2
            sed -n '1,80p' codex.patch >&2
            echo "First 80 lines of raw model output:" >&2
            sed -n '1,80p' codex-raw.txt >&2
            exit 1
          fi

      - name: Create implementation branch
        env:
          BRANCH_NAME: codex/issue-${{ github.event.issue.number }}
        shell: bash
        run: |
          exec > >(tee -a implementation.log) 2>&1
          set -euo pipefail
          git checkout -B "$BRANCH_NAME"

      - name: Apply patch
        shell: bash
        run: |
          exec > >(tee -a implementation.log) 2>&1
          set -euo pipefail
          git apply --reject --whitespace=fix codex.patch

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Validate changes
        shell: bash
        run: |
          exec > >(tee -a implementation.log) 2>&1
          set -euo pipefail
          uv sync --dev
          uv run python -m compileall src tests
          uv run pytest

      - name: Commit changes
        env:
          BRANCH_NAME: codex/issue-${{ github.event.issue.number }}
        shell: bash
        run: |
          exec > >(tee -a implementation.log) 2>&1
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "feat: implement issue #${{ github.event.issue.number }}"
          git push origin "$BRANCH_NAME" --force-with-lease

      - name: Open or update pull request
        uses: actions/github-script@v7
        env:
          BRANCH_NAME: codex/issue-${{ github.event.issue.number }}
        with:
          github-token: ${{ github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = process.env.BRANCH_NAME;
            const issueNumber = context.payload.issue.number;
            const title = `feat: implement issue #${issueNumber}`;
            const body = [
              `Closes #${issueNumber}`,
              '',
              'This PR was generated from the approved issue plan.',
            ].join('\n');

            const existing = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              head: `${owner}:${branch}`,
              per_page: 100,
            });

            if (existing.length > 0) {
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: existing[0].number,
                title,
                body,
              });
            } else {
              await github.rest.pulls.create({
                owner,
                repo,
                title,
                head: branch,
                base: 'main',
                body,
              });
            }

      - name: Comment success
        uses: actions/github-script@v7
        env:
          BRANCH_NAME: codex/issue-${{ github.event.issue.number }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `Implementation started from the approved plan and a PR branch was pushed: \`${process.env.BRANCH_NAME}\`.`,
            })

      - name: Comment failure
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            let logTail = 'No implementation log captured.';
            if (fs.existsSync('implementation.log')) {
              const lines = fs.readFileSync('implementation.log', 'utf8').trim().split('\n');
              logTail = lines.slice(-80).join('\n') || logTail;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: [
                'Implementation was approved, but the automated patch/apply/test flow failed.',
                '',
                'Recent failure output:',
                '```text',
                logTail,
                '```',
              ].join('\n'),
            })
